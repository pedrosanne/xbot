<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Premium Gradient Background -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#a78bfa" />
      <stop offset="60%" stop-color="#8b5cf6" />
      <stop offset="100%" stop-color="#6d28d9" />
    </radialGradient>
    <!-- Lightning Bolt Gradient -->
    <linearGradient id="boltGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#ddd6fe" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background Base -->
  <rect width="512" height="512" rx="128" fill="url(#bgGrad)" />

  <!-- Logo Graphics Group -->
  <g transform="translate(10, 10)">
    <!-- Stylized Chat Bubble Outer -->
    <path d="M 246 90 C 130.3 90 40 171.1 40 270 C 40 322.2 64.9 369.3 105.1 403 C 96.5 439.4 75.1 465.1 74.3 466 C 72.8 467.8 72.5 470.2 73.6 472.2 C 74.7 474.3 76.9 475.6 79.3 475.6 C 130.6 475.6 182.2 447.1 211.2 429.5 C 222.6 431.1 234.2 432 246 432 C 361.7 432 452 350.9 452 251 C 452 151.1 361.7 90 246 90 Z" fill="rgba(255, 255, 255, 0.12)" />
    
    <!-- Stylized Chat Bubble Inner -->
    <path d="M 246 100 C 135.8 100 50 177.3 50 270 C 50 318.4 73.9 362 112.5 393.3 C 104.3 427 84 450.9 83.2 451.7 C 81.8 453.3 81.6 455.5 82.6 457.4 C 83.6 459.3 85.6 460.5 87.8 460.5 C 135.7 460.5 183.8 434 210.9 417.6 C 222.3 419.1 234.1 420 246 420 C 356.2 420 442 342.7 442 250 C 442 157.3 356.2 100 246 100 Z" fill="rgba(255, 255, 255, 0.08)" stroke="rgba(255, 255, 255, 0.3)" stroke-width="4" />

    <!-- Lightning Bolt (AI Automation) -->
    <path d="M 270 140 L 160 270 L 240 270 L 210 380 L 320 250 L 240 250 Z" fill="url(#boltGrad)" filter="url(#glow)" />
  </g>
</svg>
