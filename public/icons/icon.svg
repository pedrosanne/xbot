<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Carbon Dark Radial Gradient Background -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#18181b" />
      <stop offset="50%" stop-color="#09090b" />
      <stop offset="100%" stop-color="#000000" />
    </radialGradient>

    <!-- Chrome Metallic/Silver Linear Gradient for the "X" -->
    <linearGradient id="metalGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="40%" stop-color="#e4e4e7" />
      <stop offset="70%" stop-color="#71717a" />
      <stop offset="100%" stop-color="#27272a" />
    </linearGradient>

    <!-- Sleek Drop Shadow Filter -->
    <filter id="sleekShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="20" flood-color="#000000" flood-opacity="0.75" />
    </filter>
  </defs>

  <!-- Background base with rounded corners -->
  <rect width="512" height="512" rx="128" fill="url(#bgGrad)" />

  <!-- Premium boundary line inset -->
  <rect x="24" y="24" width="464" height="464" rx="104" fill="none" stroke="rgba(255, 255, 255, 0.04)" stroke-width="3" />

  <!-- Stylized X Graphic -->
  <g filter="url(#sleekShadow)">
    <!-- Main Diagonal Bar (Top-Left to Bottom-Right) -->
    <rect x="231" y="56" width="50" height="400" rx="25" fill="url(#metalGrad)" transform="rotate(-45 256 256)" />

    <!-- Split Diagonal Bar - Top-Right Segment -->
    <rect x="231" y="56" width="50" height="155" rx="25" fill="url(#metalGrad)" transform="rotate(45 256 256)" />

    <!-- Split Diagonal Bar - Bottom-Left Segment -->
    <rect x="231" y="301" width="50" height="155" rx="25" fill="url(#metalGrad)" transform="rotate(45 256 256)" />
  </g>
</svg>
